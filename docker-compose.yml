name: agricultural-dev

services:
  agricultural-backend:
    build:
      context: ./agricultural-backend
    container_name: agricultural-backend
    ports:
      - "4000:4000"
    env_file:
      - ./agricultural-backend/.env.docker
    volumes:
      - ./agricultural-backend:/app
      - backend_node_modules:/app/node_modules
      - ./agricultural-backend/src:/app/src
      - ./agricultural-backend/package.json:/app/package.json
      - ./agricultural-backend/tsconfig.json:/app/tsconfig.json
    command:
      - sh
      - -lc
      - |
        corepack enable
        pnpm config set store-dir /root/.local/share/pnpm/store --global
        pnpm -v
        if [ ! -x node_modules/.bin/nest ]; then
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
        fi
        # Ensure swagger deps exist (dev hot-reload scenario)
        node -e "const d=require('./package.json').dependencies||{};process.exit(d['@nestjs/swagger']?0:1)" \
          || pnpm add @nestjs/swagger swagger-ui-express
        # Dev runner
        exec pnpm start:dev
    working_dir: /app
    depends_on:
      agricultural-mongodb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    ulimits:
      nofile: { soft: 1048576, hard: 1048576 }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks: [appnet]

  agricultural-frontend:
    build:
      context: ./agricultural-frontend
    container_name: agricultural-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./agricultural-frontend/.env.docker
    volumes:
      - ./agricultural-frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./agricultural-frontend/src:/app/src
      - ./agricultural-frontend/package.json:/app/package.json
      - ./agricultural-frontend/tsconfig.json:/app/tsconfig.json
    command:
      - sh
      - -lc
      - |
        corepack enable
        pnpm -v
        if [ ! -x node_modules/.bin/next ]; then
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
        fi
        exec pnpm dev -p 3000 --hostname 0.0.0.0
    depends_on:
      agricultural-backend:
        condition: service_started
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks: [appnet]

  agricultural-minio:
    image: minio/minio:latest
    container_name: agricultural-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks: [appnet]

  agricultural-mongodb:
    image: mongo:8.0
    container_name: agricultural-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      TZ: Asia/Bangkok
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand({ ping: 1 }).ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks: [appnet]

volumes:
  backend_node_modules:
  frontend_node_modules:
  mongo_data:
  minio_data:

networks:
  appnet:
    driver: bridge
